services:
  - type: web
    name: chrono-lab
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: SESSION_SECRET
        generateValue: true
      - key: DB_PATH
        value: /tmp/chronolab.db
      - key: SHOW_DEFAULT_ADMIN_HINT
        value: "0"
